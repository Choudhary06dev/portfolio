<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Theme Initialization Script to Prevent Flicker -->
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {
          console.error(e);
        }
      })();
    </script>
    
    <!-- Primary SEO Meta Tags -->
    <title>%VITE_SITE_NAME%</title>
    <meta name="description" content="Portfolio of Amjad, a Principal Frontend Architect and Senior React Engineer specializing in building premium, high-performance, and visually stunning web applications." />
    <meta name="keywords" content="Frontend Architect, Senior React Engineer, TypeScript, Tailwind CSS, Vite, Framer Motion, Web Performance, Portfolio" />
    <meta name="author" content="Amjad" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Amjad | Principal Frontend Architect & Senior React Engineer" />
    <meta property="og:description" content="Portfolio of Amjad, a Principal Frontend Architect and Senior React Engineer specializing in building premium, high-performance, and visually stunning web applications." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Amjad | Principal Frontend Architect & Senior React Engineer" />
    <meta property="twitter:description" content="Portfolio of Amjad, a Principal Frontend Architect and Senior React Engineer specializing in building premium, high-performance, and visually stunning web applications." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Preconnect to Google Fonts for performance optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
